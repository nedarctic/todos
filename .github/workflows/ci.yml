name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v3

      # 2. Use Node 24 to match local dev
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Debug Node/npm versions
      - name: Show Node/npm versions
        run: |
          node -v
          npm -v

      # 5. Run tests with coverage
      - name: Run tests
        run: npx vitest run --coverage

      # 6. Upload coverage artifact if it exists
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage